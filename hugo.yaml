    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
  homeInfoParams:
    Name: Ben Mask
    Tagline: >-
      Senior SRE at <a href="https://fellow.app">Fellow</a>. Writing about
      systems, infrastructure, and the things I tinker with on the side.
    Now: >-
      Building <a href="https://containix.dev">Containix</a>. Tweaking the homelab.
      Out in the garden.
  heroLinks:
    - { name: "GitHub", url: "https://github.com/atmask" }
    - { name: "LinkedIn", url: "https://www.linkedin.com/in/ben-mask-936b49185/" }
    - { name: "RSS", url: "/index.xml" }
    - { name: "Email", url: "mailto:benjaminajm@gmail.com" }
  favorites:
    - /posts/10-tenets/
    - /posts/15-steph-ango/
    - /posts/18-nix-experimental/
  socialIcons: # optional
    - name: Github
      url: https://github.com/atmask
    - name: LinkedIn
      url: https://www.linkedin.com/in/ben-mask-936b49185/
    - name: email
      url: mailto:benjaminajm@gmail.com
