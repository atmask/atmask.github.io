baseURL: https://benmask.com/
languageCode: en-us
title: Ben Mask
theme:
  - PaperMod
frontmatter:
  default: yaml
menus:
  main:
    - name: Posts
      url: posts/
      weight: 10
    - name: Tags
      url: tags/
      weight: 20
    - name: Search
      url: search/
      weight: 30
services:
  googleAnalytics:
    ID: G-H8WZT724E8 ## Bound to my domain. This is fine and not a leak
outputs:
