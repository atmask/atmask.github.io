{{- if .IsHome }}
<div class="home-footer-graph">
  {{ partial "contribution_graph.html" . }}
</div>
{{ partial "wave.html" (dict "position" "bottom") }}
<script>
(function() {
  document.querySelectorAll('.wave-container').forEach(container => {
    const paths = container.querySelectorAll('.wave-path');
    if (!paths.length) return;
    const height = parseInt(container.dataset.height) || 60;
    const width = 1200;
    const midY = height / 2;
    const isBottom = container.dataset.position === 'bottom';

    function noise(x, t, seed) {
      return Math.sin(x * 0.008 + t + seed) * Math.sin(x * 0.003 + t * 0.7 + seed * 2) +
             Math.sin(x * 0.015 + t * 1.3 + seed * 0.5) * 0.5 +
             Math.sin(x * 0.002 + t * 0.4 + seed * 3) * 1.5;
    }

    function generatePath(time, seed, amplitude, yOffset) {
      const pts = [];
      const step = 30;
      for (let x = 0; x <= width; x += step) {
        const y = (yOffset || midY) + noise(x, time, seed) * amplitude;
        if (x === 0) {
          pts.push('M ' + x + ' ' + y);
        } else {
          const px = x - step;
          const py = (yOffset || midY) + noise(px, time, seed) * amplitude;
          pts.push('Q ' + (px + step / 2) + ' ' + py + ' ' + (px + step) + ' ' + y);
        }
      }
      return pts.join(' ');
    }

    const start = Date.now();
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) {
      // Render a single static frame and stop.
      if (isBottom) {
        paths[0].setAttribute('d', generatePath(0, 0, 25, height * 0.15));
        paths[1] && paths[1].setAttribute('d', generatePath(0, 2, 20, height * 0.3));
        paths[2] && paths[2].setAttribute('d', generatePath(0, 4, 22, height * 0.45));
        paths[3] && paths[3].setAttribute('d', generatePath(0, 6, 28, height * 0.5));
        paths[4] && paths[4].setAttribute('d', generatePath(0, 8, 18, height * 0.55));
        paths[5] && paths[5].setAttribute('d', generatePath(0, 10, 24, height * 0.65));
        paths[6] && paths[6].setAttribute('d', generatePath(0, 12, 20, height * 0.75));
        paths[7] && paths[7].setAttribute('d', generatePath(0, 14, 26, height * 0.85));
        paths[8] && paths[8].setAttribute('d', generatePath(0, 16, 22, height * 0.95));
      } else {
        paths[0].setAttribute('d', generatePath(0, 0, 12));
        paths[1] && paths[1].setAttribute('d', generatePath(0, 2, 10));
        paths[2] && paths[2].setAttribute('d', generatePath(0, 4, 8));
      }
      return;
    }

    let rafId = null;
    function animate() {
      // Skip work when the tab is hidden — saves CPU/battery without affecting visuals.
      if (document.hidden) { rafId = null; return; }
      const t = (Date.now() - start) / 1000;
      if (isBottom) {
        paths[0].setAttribute('d', generatePath(t * 0.30, 0, 25, height * 0.15));
        paths[1].setAttribute('d', generatePath(t * 0.25, 2, 20, height * 0.30));
        paths[2].setAttribute('d', generatePath(t * 0.35, 4, 22, height * 0.45));
        paths[3].setAttribute('d', generatePath(t * 0.28, 6, 28, height * 0.50));
        paths[4].setAttribute('d', generatePath(t * 0.32, 8, 18, height * 0.55));
        paths[5].setAttribute('d', generatePath(t * 0.22, 10, 24, height * 0.65));
        paths[6].setAttribute('d', generatePath(t * 0.38, 12, 20, height * 0.75));
        paths[7].setAttribute('d', generatePath(t * 0.26, 14, 26, height * 0.85));
        paths[8].setAttribute('d', generatePath(t * 0.34, 16, 22, height * 0.95));
      } else {
        paths[0].setAttribute('d', generatePath(t * 0.30, 0, 12));
        paths[1].setAttribute('d', generatePath(t * 0.25, 2, 10));
        paths[2].setAttribute('d', generatePath(t * 0.35, 4, 8));
      }
      rafId = requestAnimationFrame(animate);
    }
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && rafId === null) animate();
    });
    animate();
  });
})();
</script>
{{- end }}
