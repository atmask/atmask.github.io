<style>
  .contrib-graph {
    --cell: 10px;
    --gap: 3px;
    --radius: 2px;
    --c0: var(--tertiary);
    --c1: #40c463;
    --c2: #30a14e;
    --c3: #216e39;
    --c4: #0d3818;
    width: max-content;
    max-width: 100%;
    margin: 1.25rem auto 1.5rem;
    font-size: 11px;
    color: var(--secondary);
  }
  .dark .contrib-graph {
    --c1: #26a641;
    --c2: #39d353;
    --c3: #56d364;
    --c4: #8ddca5;
  }
  .contrib-title {
    font-size: 0.95rem;
    margin: 0 0 0.5rem;
    color: var(--primary);
    font-weight: 600;
  }
  .contrib-body {
    display: grid;
    grid-template-columns: auto auto;
    gap: var(--gap);
  }
  .contrib-months {
    display: grid;
    grid-template-columns: repeat(53, var(--cell));
    column-gap: var(--gap);
    margin-left: calc(28px + var(--gap));
    margin-bottom: 4px;
    height: 13px;
  }
  .contrib-month { font-size: 10px; white-space: nowrap; }
  .contrib-days {
    display: grid;
    grid-template-rows: repeat(7, var(--cell));
    row-gap: var(--gap);
    width: 28px;
    font-size: 10px;
    align-items: center;
  }
  .contrib-grid {
    display: grid;
    grid-template-columns: repeat(53, var(--cell));
    column-gap: var(--gap);
  }
  .contrib-week {
    display: grid;
    grid-template-rows: repeat(7, var(--cell));
    row-gap: var(--gap);
  }
  .contrib-day {
    position: relative;
    display: block;
    width: var(--cell);
    height: var(--cell);
    border-radius: var(--radius);
    background: var(--c0);
    outline: 1px solid transparent;
    outline-offset: -1px;
  }
  .contrib-day[data-level="1"] { background: var(--c1); }
  .contrib-day[data-level="2"] { background: var(--c2); }
  .contrib-day[data-level="3"] { background: var(--c3); }
  .contrib-day[data-level="4"] { background: var(--c4); }
  .contrib-link { cursor: pointer; }
  .contrib-day:hover {
    outline: 1px solid var(--primary);
    outline-offset: 1px;
  }
  .contrib-day[data-label]:hover::after {
    content: attr(data-label);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: var(--theme);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .contrib-day[data-label]:hover::before {
    content: "";
    position: absolute;
    bottom: calc(100% + 2px);
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--primary);
    z-index: 10;
    pointer-events: none;
  }
  /* Flip tooltip below for top rows so it doesn't clip */
  .contrib-week .contrib-day:nth-child(-n+3):hover::after {
    bottom: auto;
    top: calc(100% + 6px);
  }
  .contrib-week .contrib-day:nth-child(-n+3):hover::before {
    bottom: auto;
    top: calc(100% + 2px);
    border-top-color: transparent;
    border-bottom-color: var(--primary);
  }
  .contrib-future { visibility: hidden; }
  .contrib-legend {
    display: flex;
    align-items: center;
    gap: var(--gap);
    justify-content: flex-end;
    margin-top: 8px;
    font-size: 10px;
  }
  .contrib-legend .contrib-day { display: inline-block; }
</style>
